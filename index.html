<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dance Kingdom Admin V10</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang HK", "Microsoft JhengHei", sans-serif;
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #f6f7fb 0%, #eef1f8 100%);
        color: #111827;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(720px, calc(100vw - 32px));
        background: white;
        border: 1px solid #dbe2ef;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        margin: 8px 0;
        line-height: 1.6;
        font-size: 16px;
      }
      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      a {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }
      .primary {
        background: #111827;
        color: white;
      }
      .secondary {
        background: #e5e7eb;
        color: #111827;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Dance Kingdom Admin V10</h1>
      <p>Professional PDF generation with Chinese font support is live.</p>
      <p>按下面按鈕可以下載測試 PDF，睇下字體大小同繁體中文顯示。</p>
      <div class="actions">
        <a class="primary" href="/api/index.py/api/pdf">Download PDF</a>
        <a class="secondary" href="/api/index.py/api/health">Health Check</a>
      </div>
      <p style="margin-top: 18px;">API: <code>/api/index.py/api/pdf</code></p>
    </main>
  </body>
</html>
